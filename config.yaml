## Манифест аддона — читается Home Assistant Supervisor

name: "HA Dashboard"
version: "0.1.0"
slug: "ha-dashboard"
description: "Modern Next.js + shadcn dashboard for Home Assistant"

# На каких архитектурах работает
arch:
  - aarch64   # Raspberry Pi 4+
  - amd64     # x86 серверы / виртуалки

# Порт нашего Next.js сервера
ports:
  "3000/tcp": 3000

# Ingress = аддон встраивается прямо в боковую панель HA
# Без ingress нужно было бы открывать отдельный порт
ingress: true
ingress_port: 3000

# Иконка в боковой панели HA
panel_icon: mdi:view-dashboard
panel_title: "Dashboard"

# Самое важное — даёт доступ к HA REST API и WebSocket
# Supervisor автоматически создаст SUPERVISOR_TOKEN в env
homeassistant_api: true

# Дополнительные права (пока минимум)
options: {}
schema: {}
