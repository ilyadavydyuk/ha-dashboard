worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8099;

        location / {
            # Читаем X-Ingress-Path из заголовка который ставит HA
            # и передаём его Next.js как переменную
            set $ingress_path $http_x_ingress_path;

            # Проксируем на Next.js
            proxy_pass http://localhost:3000;

            # Передаём важные заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Ingress-Path $ingress_path;

            # Rewrite — заменяем пути в HTML/JS ответах
            # Это ключевая часть: nginx на лету заменяет /_next/ 
            # на /api/hassio_ingress/TOKEN/_next/
            sub_filter_once off;
            sub_filter_types *;
            sub_filter '/_next/' '$ingress_path/_next/';
            sub_filter '/api/' '$ingress_path/api/';
        }
    }
}
